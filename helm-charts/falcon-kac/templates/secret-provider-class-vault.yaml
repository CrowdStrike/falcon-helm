{{- if and (include "falcon-kac.csiEnabled" . | eq "true") (eq (include "falcon-kac.csiProvider" .) "vault") }}
{{- if .Values.falconSecret.enabled }}
  {{- fail "secretsStore and falconSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- if include "falcon-kac.falconCid" . }}
  {{- fail "secretsStore and falcon.cid cannot be used together. Use one secret source." }}
{{- end }}
{{- $address := .Values.secretsStore.vault.address | default .Values.global.secretsStore.vault.address }}
{{- if not $address }}
  {{- fail "secretsStore.vault.address (or global.secretsStore.vault.address) is required when provider is vault." }}
{{- end }}
{{- $roleName := .Values.secretsStore.vault.roleName | default .Values.global.secretsStore.vault.roleName }}
{{- $secretPath := .Values.secretsStore.vault.secretPath | default .Values.global.secretsStore.vault.secretPath }}
{{- if not $secretPath }}
  {{- fail "secretsStore.vault.secretPath (or global.secretsStore.vault.secretPath) is required when provider is vault." }}
{{- end }}
{{- $cidKey := .Values.secretsStore.vault.cidSecretKey | default .Values.global.secretsStore.vault.cidSecretKey | default "cid" }}
{{- $tokenKey := .Values.secretsStore.vault.provisioningTokenSecretKey | default .Values.global.secretsStore.vault.provisioningTokenSecretKey | default "provisioning_token" }}
{{- $additionalParams := .Values.secretsStore.vault.additionalParameters | default .Values.global.secretsStore.vault.additionalParameters | default dict }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "falcon-kac.fullname" . }}-csi
  namespace: {{ include "falcon-kac.namespace" . }}
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ $address | quote }}
    {{- if $roleName }}
    roleName: {{ $roleName | quote }}
    {{- end }}
    {{- range $key, $value := $additionalParams }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    objects: |
      - objectName: "falcon-cid"
        secretPath: {{ $secretPath | quote }}
        secretKey: {{ $cidKey | quote }}
      {{- if .Values.secretsStore.provisioningTokenSecretName }}
      - objectName: {{ .Values.secretsStore.provisioningTokenSecretName | quote }}
        secretPath: {{ $secretPath | quote }}
        secretKey: {{ $tokenKey | quote }}
      {{- end }}
  secretObjects:
    - secretName: {{ include "falcon-kac.csiSecretName" . }}
      type: Opaque
      data:
        - objectName: "falcon-cid"
          key: FALCONCTL_OPT_CID
        {{- if .Values.secretsStore.provisioningTokenSecretName }}
        - objectName: {{ .Values.secretsStore.provisioningTokenSecretName | quote }}
          key: FALCONCTL_OPT_PROVISIONING_TOKEN
        {{- end }}
{{- end }}
