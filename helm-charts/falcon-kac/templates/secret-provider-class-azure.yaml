{{- if and (include "falcon-kac.csiEnabled" . | eq "true") (eq (include "falcon-kac.csiProvider" .) "azure") }}
{{- if .Values.falconSecret.enabled }}
  {{- fail "secretsStore and falconSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- if include "falcon-kac.falconCid" . }}
  {{- fail "secretsStore and falcon.cid cannot be used together. Use one secret source." }}
{{- end }}
{{- $vaultName := .Values.secretsStore.azure.vaultName | default .Values.global.secretsStore.azure.vaultName }}
{{- if not $vaultName }}
  {{- fail "secretsStore.azure.vaultName (or global.secretsStore.azure.vaultName) is required when provider is azure." }}
{{- end }}
{{- $tenantID := .Values.secretsStore.azure.tenantID | default .Values.global.secretsStore.azure.tenantID }}
{{- if not $tenantID }}
  {{- fail "secretsStore.azure.tenantID (or global.secretsStore.azure.tenantID) is required when provider is azure." }}
{{- end }}
{{- $clientID := .Values.secretsStore.azure.clientID | default .Values.global.secretsStore.azure.clientID }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "falcon-kac.fullname" . }}-csi
  namespace: {{ include "falcon-kac.namespace" . }}
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- if $clientID }}
    clientID: {{ $clientID | quote }}
    {{- end }}
    keyvaultName: {{ $vaultName | quote }}
    tenantId: {{ $tenantID | quote }}
    objects: |
      array:
        - |
          objectName: "falcon-cid"
          objectType: secret
          objectVersion: ""
        {{- if .Values.secretsStore.provisioningTokenSecretName }}
        - |
          objectName: {{ .Values.secretsStore.provisioningTokenSecretName | quote }}
          objectType: secret
          objectVersion: ""
        {{- end }}
  secretObjects:
    - secretName: {{ include "falcon-kac.csiSecretName" . }}
      type: Opaque
      data:
        - objectName: "falcon-cid"
          key: FALCONCTL_OPT_CID
        {{- if .Values.secretsStore.provisioningTokenSecretName }}
        - objectName: {{ .Values.secretsStore.provisioningTokenSecretName | quote }}
          key: FALCONCTL_OPT_PROVISIONING_TOKEN
        {{- end }}
{{- end }}
