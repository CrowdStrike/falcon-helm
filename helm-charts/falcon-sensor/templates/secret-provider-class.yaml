{{- if (include "falcon-sensor.akvEnabled" .) | eq "true" }}
{{- if .Values.falconSecret.enabled }}
  {{- fail "azure.keyVault and falconSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- if include "falcon-sensor.falconCid" . }}
  {{- fail "azure.keyVault and falcon.cid cannot be used together. Use one secret source." }}
{{- end }}
{{- if not (include "falcon-sensor.akvVaultName" .) }}
  {{- fail "azure.keyVault.vaultName (or global.azure.keyVault.vaultName) is required when AKV is enabled." }}
{{- end }}
{{- if not (include "falcon-sensor.akvTenantID" .) }}
  {{- fail "azure.keyVault.tenantID (or global.azure.keyVault.tenantID) is required when AKV is enabled." }}
{{- end }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "falcon-sensor.fullname" . }}-akv
  namespace: {{ include "falcon-sensor.namespace" . }}
  labels:
    {{- include "falcon-sensor.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- if (include "falcon-sensor.akvClientID" .) }}
    clientID: {{ include "falcon-sensor.akvClientID" . | quote }}
    {{- end }}
    keyvaultName: {{ include "falcon-sensor.akvVaultName" . | quote }}
    tenantId: {{ include "falcon-sensor.akvTenantID" . | quote }}
    objects: |
      array:
        - |
          objectName: "falcon-cid"
          objectType: secret
          objectVersion: ""
        {{- if .Values.azure.keyVault.provisioningTokenSecretName }}
        - |
          objectName: {{ .Values.azure.keyVault.provisioningTokenSecretName | quote }}
          objectType: secret
          objectVersion: ""
        {{- end }}
  secretObjects:
    - secretName: {{ include "falcon-sensor.fullname" . }}-akv
      type: Opaque
      data:
        - objectName: "falcon-cid"
          key: FALCONCTL_OPT_CID
        {{- if .Values.azure.keyVault.provisioningTokenSecretName }}
        - objectName: {{ .Values.azure.keyVault.provisioningTokenSecretName | quote }}
          key: FALCONCTL_OPT_PROVISIONING_TOKEN
        {{- end }}
{{- end }}
