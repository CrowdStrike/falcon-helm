{{- if and (include "falcon-image-analyzer.csiEnabled" . | eq "true") (eq (include "falcon-image-analyzer.csiProvider" .) "azure") }}
{{- if .Values.crowdstrikeConfig.existingSecret }}
  {{- fail "secretsStore and crowdstrikeConfig.existingSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- if and .Values.crowdstrikeConfig.clientID .Values.crowdstrikeConfig.clientSecret }}
  {{- fail "secretsStore and crowdstrikeConfig.clientID/clientSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- $vaultName := .Values.secretsStore.azure.vaultName | default .Values.global.secretsStore.azure.vaultName }}
{{- if not $vaultName }}
  {{- fail "secretsStore.azure.vaultName (or global.secretsStore.azure.vaultName) is required when provider is azure." }}
{{- end }}
{{- $tenantID := .Values.secretsStore.azure.tenantID | default .Values.global.secretsStore.azure.tenantID }}
{{- if not $tenantID }}
  {{- fail "secretsStore.azure.tenantID (or global.secretsStore.azure.tenantID) is required when provider is azure." }}
{{- end }}
{{- $clientID := .Values.secretsStore.azure.clientID | default .Values.global.secretsStore.azure.clientID }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "falcon-image-analyzer.fullname" . }}-csi
  namespace: {{ include "falcon-image-analyzer.namespace" . }}
  labels:
    {{- include "falcon-image-analyzer.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- if $clientID }}
    clientID: {{ $clientID | quote }}
    {{- end }}
    keyvaultName: {{ $vaultName | quote }}
    tenantId: {{ $tenantID | quote }}
    objects: |
      array:
        - |
          objectName: "falcon-client-id"
          objectType: secret
          objectVersion: ""
        - |
          objectName: "falcon-client-secret"
          objectType: secret
          objectVersion: ""
        {{- if not (or .Values.crowdstrikeConfig.cid .Values.global.falcon.cid) }}
        - |
          objectName: "falcon-cid"
          objectType: secret
          objectVersion: ""
        {{- end }}
  secretObjects:
    - secretName: {{ include "falcon-image-analyzer.csiSecretName" . }}
      type: Opaque
      data:
        - objectName: "falcon-client-id"
          key: AGENT_CLIENT_ID
        - objectName: "falcon-client-secret"
          key: AGENT_CLIENT_SECRET
        {{- if not (or .Values.crowdstrikeConfig.cid .Values.global.falcon.cid) }}
        - objectName: "falcon-cid"
          key: AGENT_CID
        {{- end }}
{{- end }}
