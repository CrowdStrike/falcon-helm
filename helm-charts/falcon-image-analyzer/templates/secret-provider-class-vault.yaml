{{- if and (include "falcon-image-analyzer.csiEnabled" . | eq "true") (eq (include "falcon-image-analyzer.csiProvider" .) "vault") }}
{{- if .Values.crowdstrikeConfig.existingSecret }}
  {{- fail "secretsStore and crowdstrikeConfig.existingSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- if and .Values.crowdstrikeConfig.clientID .Values.crowdstrikeConfig.clientSecret }}
  {{- fail "secretsStore and crowdstrikeConfig.clientID/clientSecret cannot be used together. Use one secret source." }}
{{- end }}
{{- $address := .Values.secretsStore.vault.address | default .Values.global.secretsStore.vault.address }}
{{- if not $address }}
  {{- fail "secretsStore.vault.address (or global.secretsStore.vault.address) is required when provider is vault." }}
{{- end }}
{{- $roleName := .Values.secretsStore.vault.roleName | default .Values.global.secretsStore.vault.roleName }}
{{- if not $roleName }}
  {{- fail "secretsStore.vault.roleName (or global.secretsStore.vault.roleName) is required when provider is vault." }}
{{- end }}
{{- $secretPath := .Values.secretsStore.vault.secretPath | default .Values.global.secretsStore.vault.secretPath }}
{{- if not $secretPath }}
  {{- fail "secretsStore.vault.secretPath (or global.secretsStore.vault.secretPath) is required when provider is vault." }}
{{- end }}
{{- $clientIdKey := .Values.secretsStore.vault.clientIdSecretKey | default .Values.global.secretsStore.vault.clientIdSecretKey | default "client_id" }}
{{- $clientSecretKey := .Values.secretsStore.vault.clientSecretSecretKey | default .Values.global.secretsStore.vault.clientSecretSecretKey | default "client_secret" }}
{{- $cidKey := .Values.secretsStore.vault.cidSecretKey | default .Values.global.secretsStore.vault.cidSecretKey | default "cid" }}
{{- $additionalParams := .Values.secretsStore.vault.additionalParameters | default .Values.global.secretsStore.vault.additionalParameters | default dict }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "falcon-image-analyzer.fullname" . }}-csi
  namespace: {{ include "falcon-image-analyzer.namespace" . }}
  labels:
    {{- include "falcon-image-analyzer.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ $address | quote }}
    roleName: {{ $roleName | quote }}
    {{- range $key, $value := $additionalParams }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    objects: |
      - objectName: "falcon-client-id"
        secretPath: {{ $secretPath | quote }}
        secretKey: {{ $clientIdKey | quote }}
      - objectName: "falcon-client-secret"
        secretPath: {{ $secretPath | quote }}
        secretKey: {{ $clientSecretKey | quote }}
      {{- if not (or .Values.crowdstrikeConfig.cid .Values.global.falcon.cid) }}
      - objectName: "falcon-cid"
        secretPath: {{ $secretPath | quote }}
        secretKey: {{ $cidKey | quote }}
      {{- end }}
  secretObjects:
    - secretName: {{ include "falcon-image-analyzer.csiSecretName" . }}
      type: Opaque
      data:
        - objectName: "falcon-client-id"
          key: AGENT_CLIENT_ID
        - objectName: "falcon-client-secret"
          key: AGENT_CLIENT_SECRET
        {{- if not (or .Values.crowdstrikeConfig.cid .Values.global.falcon.cid) }}
        - objectName: "falcon-cid"
          key: AGENT_CID
        {{- end }}
{{- end }}
