{{- $existingSecretName := include "falcon-image-analyzer.falconSecretName" . -}}
{{- $shouldCreateCid := include "falcon-image-analyzer.falconCid" . | trim -}}
{{- $shouldCreateClientCreds := include "falcon-image-analyzer.shouldCreateClientCredsInSecret" . | trim | eq "true" -}}
{{- $chartSecretName := include "falcon-image-analyzer.fullname" . -}}
{{- if and .Values.testing.enabled $existingSecretName -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "falcon-image-analyzer.fullname" . }}-test-existing-secret"
  namespace: {{ include "falcon-image-analyzer.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "falcon-image-analyzer.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: test
    helm.sh/chart: {{ include "falcon-image-analyzer.chart" . }}
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: kubectl
      image: docker.io/bitnami/kubectl
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - |
        FAILED=0
        EXISTING_SECRET="{{ $existingSecretName }}"
        CHART_SECRET="{{ $chartSecretName }}"
        NAMESPACE="{{ include "falcon-image-analyzer.namespace" . }}"
        SHOULD_CREATE_CID="{{ $shouldCreateCid }}"
        SHOULD_CREATE_CLIENT_CREDS="{{ $shouldCreateClientCreds }}"

        echo "--- Testing Secret Configuration ---"
        echo "Existing Secret: ${EXISTING_SECRET}"
        {{- if or $shouldCreateCid $shouldCreateClientCreds }}
        echo "Chart-created Secret: ${CHART_SECRET}"
        {{- end }}
        echo "Configuration: clientID={{ if .Values.crowdstrikeConfig.clientID }}provided{{ else }}empty{{ end }}, clientSecret={{ if .Values.crowdstrikeConfig.clientSecret }}provided{{ else }}empty{{ end }}, cid={{ if (include "falcon-image-analyzer.falconCid" .) }}provided{{ else }}empty{{ end }}"
        echo "Should create CID: ${SHOULD_CREATE_CID}"
        echo "Should create client creds: ${SHOULD_CREATE_CLIENT_CREDS}"

        # Function to check if a key exists in a secret
        check_key_in_secret() {
            local secret_name=$1
            local key=$2
            local secret_label=$3

            if ! kubectl get secret "${secret_name}" -n "${NAMESPACE}" > /dev/null 2>&1; then
                echo "[SKIP]: Secret '${secret_name}' not found - skipping check for ${key}"
                return 0
            fi

            if ! kubectl get secret "${secret_name}" -n "${NAMESPACE}" -o json 2>&1 | jq -e ".data.${key}" > /dev/null; then
                echo "[FAIL]: ${secret_label} missing required key '${key}'"
                return 1
            fi

            VALUE=$(kubectl get secret "${secret_name}" -n "${NAMESPACE}" -o json 2>&1 | jq -r ".data.${key} // \"\"")
            if [ -z "${VALUE}" ]; then
                echo "[FAIL]: ${key} in ${secret_label} is empty"
                return 1
            fi

            echo "[OK]: ${secret_label} contains '${key}' with non-empty value"
            return 0
        }

        # Determine which secret should contain which keys based on inference
        {{- $secretKeyLocations := include "falcon-image-analyzer.secretKeyLocations" . | fromYaml -}}
        {{- $clientIdInExisting := $secretKeyLocations.AGENT_CLIENT_ID -}}
        {{- $clientSecretInExisting := $secretKeyLocations.AGENT_CLIENT_SECRET -}}
        {{- $cidInExisting := $secretKeyLocations.AGENT_CID -}}

        # Display secret key distribution
        echo ""
        echo "=== Secret Key Distribution ==="
        {{- if $clientIdInExisting }}
        echo "  AGENT_CLIENT_ID:     External secret ({{ include "falcon-image-analyzer.falconSecretName" . }})"
        {{- else }}
        echo "  AGENT_CLIENT_ID:     Chart-created secret (from values.yaml)"
        {{- end }}
        {{- if $clientSecretInExisting }}
        echo "  AGENT_CLIENT_SECRET: External secret ({{ include "falcon-image-analyzer.falconSecretName" . }})"
        {{- else }}
        echo "  AGENT_CLIENT_SECRET: Chart-created secret (from values.yaml)"
        {{- end }}
        {{- if $cidInExisting }}
        echo "  AGENT_CID:           External secret ({{ include "falcon-image-analyzer.falconSecretName" . }})"
        {{- else }}
        echo "  AGENT_CID:           Chart-created secret (from values.yaml)"
        {{- end }}
        echo "==============================="
        echo ""

        # Verify chart secret exists if it should be created
        {{- if or $shouldCreateCid $shouldCreateClientCreds }}
        # Wait up to 30 seconds for chart secret to be created
        MAX_WAIT=30
        WAIT_COUNT=0
        while [ $WAIT_COUNT -lt $MAX_WAIT ]; do
            if kubectl get secret "${CHART_SECRET}" -n "${NAMESPACE}" > /dev/null 2>&1; then
                echo "[OK]: Chart secret '${CHART_SECRET}' exists as expected"
                break
            fi
            WAIT_COUNT=$((WAIT_COUNT + 1))
            sleep 1
        done

        if [ $WAIT_COUNT -eq $MAX_WAIT ]; then
            echo "[FAIL]: Chart secret '${CHART_SECRET}' should exist but was not found after ${MAX_WAIT}s wait"
            echo "[DEBUG]: Listing all secrets in namespace for troubleshooting:"
            kubectl get secrets -n "${NAMESPACE}"
            FAILED=1
        fi
        {{- else }}
        echo "[INFO]: No chart secret expected (all keys in existing secret)"
        {{- end }}

        # Check AGENT_CLIENT_ID
        {{- if $clientIdInExisting }}
        check_key_in_secret "${EXISTING_SECRET}" "AGENT_CLIENT_ID" "Existing secret" || FAILED=1
        {{- else }}
        check_key_in_secret "${CHART_SECRET}" "AGENT_CLIENT_ID" "Chart-created secret" || FAILED=1
        {{- end }}

        # Check AGENT_CLIENT_SECRET
        {{- if $clientSecretInExisting }}
        check_key_in_secret "${EXISTING_SECRET}" "AGENT_CLIENT_SECRET" "Existing secret" || FAILED=1
        {{- else }}
        check_key_in_secret "${CHART_SECRET}" "AGENT_CLIENT_SECRET" "Chart-created secret" || FAILED=1
        {{- end }}

        # Check AGENT_CID
        {{- if $cidInExisting }}
        check_key_in_secret "${EXISTING_SECRET}" "AGENT_CID" "Existing secret" || FAILED=1
        {{- else }}
        check_key_in_secret "${CHART_SECRET}" "AGENT_CID" "Chart-created secret" || FAILED=1
        {{- end }}

        if [ "${FAILED}" -eq 1 ]; then
            exit 1
        fi

        echo "--- All secret validations passed ---"
        exit 0
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
  serviceAccountName: {{ include "falcon-image-analyzer.fullname" . }}-test-sa
  restartPolicy: Never
{{- end -}}
