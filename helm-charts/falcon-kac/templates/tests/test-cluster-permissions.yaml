{{- if .Values.testing.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "falcon-kac.fullname" . }}-test-sa
  namespace: {{ include "falcon-kac.namespace" . }}
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "falcon-kac.fullname" . }}-test-access-role
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - namespaces
  - configmaps
  - serviceaccounts
  - services
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  verbs:
  - get
  - list
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "falcon-kac.fullname" . }}-test-access-binding
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "falcon-kac.fullname" . }}-test-sa
  namespace: {{ include "falcon-kac.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "falcon-kac.fullname" . }}-test-access-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
