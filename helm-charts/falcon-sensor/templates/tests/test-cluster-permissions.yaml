{{- if .Values.testing.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "falcon-sensor.fullname" . }}-test-sa
  namespace: {{ include "falcon-sensor.namespace" . }}
  labels:
    {{- include "falcon-sensor.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "falcon-sensor.fullname" . }}-test-access-role
  labels:
    {{- include "falcon-sensor.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - namespaces
  - configmaps
  - serviceaccounts
  - services
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  verbs:
  - get
  - list
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
{{- if (include "falcon-sensor.openshiftEnabled" . | eq "true") }}
- apiGroups:
  - security.openshift.io
  resources:
  - securitycontextconstraints
  verbs:
  - get
- apiGroups:
  - security.openshift.io
  resources:
  - securitycontextconstraints
  resourceNames:
  - {{ include "falcon-sensor.sccName" . }}
  verbs:
  - use
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "falcon-sensor.fullname" . }}-test-access-binding
  labels:
    {{- include "falcon-sensor.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "falcon-sensor.fullname" . }}-test-sa
  namespace: {{ include "falcon-sensor.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "falcon-sensor.fullname" . }}-test-access-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
