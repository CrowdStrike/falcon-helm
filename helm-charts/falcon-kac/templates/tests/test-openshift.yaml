{{- if and .Values.testing.enabled (include "falcon-kac.openshiftEnabled" . | eq "true") }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "falcon-kac.fullname" . }}-test-openshift"
  namespace: {{ include "falcon-kac.namespace" . }}
  labels:
    {{- include "falcon-kac.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: kubectl
      image: docker.io/bitnami/kubectl
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - |
        FAILED=0

        {{- if and (include "falcon-kac.openshiftCreateSCC" . | eq "true") .Values.hostNetwork }}
        echo "--- Checking SCC exists ---"
        if ! kubectl get scc "{{ include "falcon-kac.sccName" . }}" > /dev/null 2>&1; then
            echo "[FAIL]: SCC '{{ include "falcon-kac.sccName" . }}' not found"
            FAILED=1
        else
            echo "[OK]: SCC '{{ include "falcon-kac.sccName" . }}' exists"
        fi

        echo "--- Checking service account is bound to SCC ---"
        SA_ENTRY="system:serviceaccount:{{ include "falcon-kac.namespace" . }}:{{ .Values.serviceAccount.name }}"
        SCC_USERS=$(kubectl get scc "{{ include "falcon-kac.sccName" . }}" -o jsonpath="{.users}" 2>&1)
        if ! echo "${SCC_USERS}" | grep -q "${SA_ENTRY}"; then
            echo "[FAIL]: Service account '${SA_ENTRY}' is not bound to SCC"
            echo "${SCC_USERS}"
            FAILED=1
        else
            echo "[OK]: Service account is bound to SCC"
        fi
        {{- end }}

        {{- if .Values.hostNetwork }}
        echo "--- Checking Deployment pods have openshift.io/scc annotation ---"
        sleep 10
        EXPECTED_SCC="{{ include "falcon-kac.sccName" . }}"
        # Exclude test pods by filtering out pods with helm.sh/hook annotation
        PODS=$(kubectl get pods -n "{{ include "falcon-kac.namespace" . }}" \
          -l "app={{ include "falcon-kac.name" . }}" \
          -o json 2>&1 | jq -r '.items[] | select(.metadata.annotations["helm.sh/hook"] == null) | .metadata.name')
        if [ -z "${PODS}" ]; then
            echo "[FAIL]: No KAC pods found"
            FAILED=1
        else
            for POD in ${PODS}; do
                SCC_ANNOTATION=$(kubectl get pod "${POD}" \
                  -n "{{ include "falcon-kac.namespace" . }}" \
                  -o jsonpath="{.metadata.annotations.openshift\.io/scc}" 2>&1)
                if [ -z "${SCC_ANNOTATION}" ]; then
                    echo "[FAIL]: Pod '${POD}' is missing openshift.io/scc annotation"
                    FAILED=1
                elif [ "${SCC_ANNOTATION}" != "${EXPECTED_SCC}" ]; then
                    echo "[FAIL]: Pod '${POD}' has SCC '${SCC_ANNOTATION}' but expected '${EXPECTED_SCC}'"
                    FAILED=1
                else
                    echo "[OK]: Pod '${POD}' is using SCC '${SCC_ANNOTATION}'"
                fi
            done
        fi
        {{- else }}
        echo "--- Skipping SCC annotation check (hostNetwork is disabled) ---"
        {{- end }}

        if [ "${FAILED}" -eq 1 ]; then
            exit 1
        fi
        exit 0
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
  serviceAccountName: {{ include "falcon-kac.fullname" . }}-test-sa
  restartPolicy: Never
{{- end }}
