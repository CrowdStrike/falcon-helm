name: Release Helm Charts

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'helm-charts/**'
  workflow_dispatch:

jobs:
  release:
    if: (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Add Helm repositories and build dependencies
        run: |
          helm repo add crowdstrike https://crowdstrike.github.io/falcon-helm
          helm repo add jchoi_cs https://mr-jungchoi.github.io/falcon-helm
          helm dependency build helm-charts/falcon-platform

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm-charts
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
