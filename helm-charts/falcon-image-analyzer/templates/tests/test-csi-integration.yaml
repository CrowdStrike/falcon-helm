{{- if and .Values.testing.enabled (include "falcon-image-analyzer.csiEnabled" . | eq "true") -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "falcon-image-analyzer.fullname" . }}-test-csi-integration"
  namespace: {{ include "falcon-image-analyzer.namespace" . }}
  labels:
    {{- include "falcon-image-analyzer.testLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
    sensor.falcon-system.crowdstrike.com/injection: disabled
spec:
  containers:
    - name: kubectl
      image: docker.io/bitnami/kubectl
      command:
      - /bin/sh
      - -c
      - |
        FAILED=0

        echo "=== CSI Driver Integration Tests ==="
        echo ""

        {{- if .Values.daemonset.enabled }}
        WORKLOAD_TYPE="daemonset"
        WORKLOAD_NAME="{{ include "falcon-image-analyzer.fullname" . }}"
        {{- else if .Values.deployment.enabled }}
        WORKLOAD_TYPE="deployment"
        WORKLOAD_NAME="{{ include "falcon-image-analyzer.fullname" . }}"
        {{- else }}
        echo "[FAIL]: Neither daemonset nor deployment is enabled"
        exit 1
        {{- end }}

        echo "Testing ${WORKLOAD_TYPE} '${WORKLOAD_NAME}'"
        echo ""

        # Test 1: SecretProviderClass exists
        echo "--- Test 1: Checking SecretProviderClass ---"
        SPC_NAME="{{ include "falcon-image-analyzer.fullname" . }}-csi"
        if ! kubectl get secretproviderclass "${SPC_NAME}" -n "{{ include "falcon-image-analyzer.namespace" . }}" > /dev/null 2>&1; then
            echo "[FAIL]: SecretProviderClass '${SPC_NAME}' not found"
            FAILED=1
        else
            echo "[OK]: SecretProviderClass '${SPC_NAME}' exists"

            # Verify provider is set correctly
            PROVIDER=$(kubectl get secretproviderclass "${SPC_NAME}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.spec.provider}' 2>&1)
            if [ "${PROVIDER}" != "{{ include "falcon-image-analyzer.csiProvider" . }}" ]; then
                echo "[FAIL]: SecretProviderClass provider is '${PROVIDER}', expected '{{ include "falcon-image-analyzer.csiProvider" . }}'"
                FAILED=1
            else
                echo "[OK]: SecretProviderClass provider is '${PROVIDER}'"
            fi
        fi
        echo ""

        # Test 2: Workload has CSI volume configured
        echo "--- Test 2: Checking ${WORKLOAD_TYPE} CSI volume configuration ---"

        # Check if csi-secrets volume exists
        CSI_VOLUME=$(kubectl get ${WORKLOAD_TYPE} "${WORKLOAD_NAME}" \
          -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          -o jsonpath='{.spec.template.spec.volumes[?(@.name=="csi-secrets")].csi.driver}' 2>&1)

        if [ "${CSI_VOLUME}" != "secrets-store.csi.k8s.io" ]; then
            echo "[FAIL]: CSI volume driver is '${CSI_VOLUME}', expected 'secrets-store.csi.k8s.io'"
            FAILED=1
        else
            echo "[OK]: CSI volume driver is configured correctly"
        fi

        # Verify secretProviderClass reference
        SPC_REF=$(kubectl get ${WORKLOAD_TYPE} "${WORKLOAD_NAME}" \
          -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          -o jsonpath='{.spec.template.spec.volumes[?(@.name=="csi-secrets")].csi.volumeAttributes.secretProviderClass}' 2>&1)

        if [ "${SPC_REF}" != "${SPC_NAME}" ]; then
            echo "[FAIL]: SecretProviderClass reference is '${SPC_REF}', expected '${SPC_NAME}'"
            FAILED=1
        else
            echo "[OK]: SecretProviderClass reference is correct"
        fi
        echo ""

        # Test 3: Workload has CSI volume mount
        echo "--- Test 3: Checking ${WORKLOAD_TYPE} CSI volume mount ---"
        VOLUME_MOUNT=$(kubectl get ${WORKLOAD_TYPE} "${WORKLOAD_NAME}" \
          -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          -o jsonpath='{.spec.template.spec.containers[0].volumeMounts[?(@.name=="csi-secrets")].mountPath}' 2>&1)

        if [ "${VOLUME_MOUNT}" != "/mnt/secrets-store" ]; then
            echo "[FAIL]: CSI volume mount path is '${VOLUME_MOUNT}', expected '/mnt/secrets-store'"
            FAILED=1
        else
            echo "[OK]: CSI volume is mounted at '/mnt/secrets-store'"
        fi
        echo ""

        # Test 4: Wait for pods to be ready
        echo "--- Test 4: Waiting for ${WORKLOAD_TYPE} pods to be ready ---"
        kubectl rollout status ${WORKLOAD_TYPE} "${WORKLOAD_NAME}" \
          -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          --timeout=300s

        if [ $? -ne 0 ]; then
            echo "[FAIL]: ${WORKLOAD_TYPE} pods failed to become ready"
            FAILED=1
        else
            echo "[OK]: ${WORKLOAD_TYPE} pods are ready"
        fi
        echo ""

        # Test 5: Check CSI volume is mounted in running pods
        echo "--- Test 5: Checking CSI volume mount in running pods ---"
        ALL_PODS=$(kubectl get pods -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          -l "app=falcon-image-analyzer" \
          --field-selector=status.phase=Running \
          -o jsonpath="{.items[*].metadata.name}" 2>&1)

        # Filter out test pods (pods with 'test-' in the name)
        PODS=""
        for POD in ${ALL_PODS}; do
            if [[ ! "${POD}" =~ test- ]]; then
                PODS="${PODS} ${POD}"
            fi
        done

        if [ -z "${PODS}" ]; then
            echo "[FAIL]: No falcon-image-analyzer pods found"
            FAILED=1
        else
            for POD in ${PODS}; do
                # Check if csi-secrets volume is mounted
                MOUNT_EXISTS=$(kubectl get pod "${POD}" \
                  -n "{{ include "falcon-image-analyzer.namespace" . }}" \
                  -o jsonpath='{.spec.volumes[?(@.name=="csi-secrets")].csi.driver}' 2>&1)

                if [ "${MOUNT_EXISTS}" != "secrets-store.csi.k8s.io" ]; then
                    echo "[FAIL]: Pod '${POD}' does not have CSI volume configured"
                    FAILED=1
                else
                    echo "[OK]: Pod '${POD}' has CSI volume configured"
                fi
            done
        fi
        echo ""

        # Test 6: Verify AGENT_CLIENT_ID and AGENT_CLIENT_SECRET environment variables
        echo "--- Test 6: Checking AGENT_CLIENT_ID and AGENT_CLIENT_SECRET environment variables ---"
        for POD in ${PODS}; do
            # Check if pod is running
            POD_STATUS=$(kubectl get pod "${POD}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.status.phase}' 2>&1)

            if [ "${POD_STATUS}" != "Running" ]; then
                echo "[WARN]: Pod '${POD}' is not running (${POD_STATUS}), skipping env check"
                continue
            fi

            # Check if AGENT_CLIENT_ID is defined
            CLIENT_ID_DEFINED=$(kubectl get pod "${POD}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.spec.containers[0].env[?(@.name=="AGENT_CLIENT_ID")].name}' 2>&1)

            if [ "${CLIENT_ID_DEFINED}" != "AGENT_CLIENT_ID" ]; then
                echo "[FAIL]: Pod '${POD}' does not have AGENT_CLIENT_ID environment variable defined"
                FAILED=1
            else
                echo "[OK]: Pod '${POD}' has AGENT_CLIENT_ID environment variable defined"

                # Check if it's using optional secretKeyRef
                IS_OPTIONAL=$(kubectl get pod "${POD}" \
                  -n "{{ include "falcon-image-analyzer.namespace" . }}" \
                  -o jsonpath='{.spec.containers[0].env[?(@.name=="AGENT_CLIENT_ID")].valueFrom.secretKeyRef.optional}' 2>&1)

                if [ "${IS_OPTIONAL}" = "true" ]; then
                    echo "[OK]: Pod '${POD}' AGENT_CLIENT_ID uses optional secretKeyRef"
                else
                    echo "[WARN]: Pod '${POD}' AGENT_CLIENT_ID secretKeyRef is not optional"
                fi
            fi

            # Check if AGENT_CLIENT_SECRET is defined
            CLIENT_SECRET_DEFINED=$(kubectl get pod "${POD}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.spec.containers[0].env[?(@.name=="AGENT_CLIENT_SECRET")].name}' 2>&1)

            if [ "${CLIENT_SECRET_DEFINED}" != "AGENT_CLIENT_SECRET" ]; then
                echo "[FAIL]: Pod '${POD}' does not have AGENT_CLIENT_SECRET environment variable defined"
                FAILED=1
            else
                echo "[OK]: Pod '${POD}' has AGENT_CLIENT_SECRET environment variable defined"

                # Check if it's using optional secretKeyRef
                IS_OPTIONAL=$(kubectl get pod "${POD}" \
                  -n "{{ include "falcon-image-analyzer.namespace" . }}" \
                  -o jsonpath='{.spec.containers[0].env[?(@.name=="AGENT_CLIENT_SECRET")].valueFrom.secretKeyRef.optional}' 2>&1)

                if [ "${IS_OPTIONAL}" = "true" ]; then
                    echo "[OK]: Pod '${POD}' AGENT_CLIENT_SECRET uses optional secretKeyRef"
                else
                    echo "[WARN]: Pod '${POD}' AGENT_CLIENT_SECRET secretKeyRef is not optional"
                fi
            fi
        done
        echo ""

        # Test 7: Verify secret is eventually created by CSI driver
        echo "--- Test 7: Checking if CSI-synced Kubernetes secret is created ---"
        SECRET_NAME="{{ include "falcon-image-analyzer.csiSecretName" . }}"

        # Wait up to 60 seconds for the secret to be created
        RETRY_COUNT=0
        MAX_RETRIES=12
        SECRET_EXISTS=false

        while [ ${RETRY_COUNT} -lt ${MAX_RETRIES} ]; do
            if kubectl get secret "${SECRET_NAME}" -n "{{ include "falcon-image-analyzer.namespace" . }}" > /dev/null 2>&1; then
                SECRET_EXISTS=true
                break
            fi
            echo "Waiting for secret '${SECRET_NAME}' to be created by CSI driver... (${RETRY_COUNT}/${MAX_RETRIES})"
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT + 1))
        done

        if [ "${SECRET_EXISTS}" = "true" ]; then
            echo "[OK]: Secret '${SECRET_NAME}' exists"

            # Check if secret has required keys
            CLIENT_ID_KEY=$(kubectl get secret "${SECRET_NAME}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.data.AGENT_CLIENT_ID}' 2>&1)

            if [ -z "${CLIENT_ID_KEY}" ]; then
                echo "[FAIL]: Secret '${SECRET_NAME}' does not have AGENT_CLIENT_ID key"
                FAILED=1
            else
                echo "[OK]: Secret '${SECRET_NAME}' contains AGENT_CLIENT_ID"
            fi

            CLIENT_SECRET_KEY=$(kubectl get secret "${SECRET_NAME}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.data.AGENT_CLIENT_SECRET}' 2>&1)

            if [ -z "${CLIENT_SECRET_KEY}" ]; then
                echo "[FAIL]: Secret '${SECRET_NAME}' does not have AGENT_CLIENT_SECRET key"
                FAILED=1
            else
                echo "[OK]: Secret '${SECRET_NAME}' contains AGENT_CLIENT_SECRET"
                # Note: We don't decode/display the actual secret values for security
            fi

            {{- if not (or .Values.crowdstrikeConfig.cid .Values.global.falcon.cid) }}
            # CID not provided via values — expect it from the CSI secret
            CID_KEY=$(kubectl get secret "${SECRET_NAME}" \
              -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              -o jsonpath='{.data.AGENT_CID}' 2>&1)

            if [ -z "${CID_KEY}" ]; then
                echo "[FAIL]: Secret '${SECRET_NAME}' does not have AGENT_CID key"
                FAILED=1
            else
                echo "[OK]: Secret '${SECRET_NAME}' contains AGENT_CID"
            fi
            {{- end }}
        else
            echo "[FAIL]: Secret '${SECRET_NAME}' was not created by CSI driver after 60 seconds"
            echo "This could indicate CSI driver is not running or secrets store authentication failed"
            FAILED=1
        fi
        echo ""

        # Test 8: Verify SecretProviderClass secretObjects configuration
        echo "--- Test 8: Checking SecretProviderClass secretObjects ---"
        SECRET_OBJ_NAME=$(kubectl get secretproviderclass "${SPC_NAME}" \
          -n "{{ include "falcon-image-analyzer.namespace" . }}" \
          -o jsonpath='{.spec.secretObjects[0].secretName}' 2>&1)

        if [ "${SECRET_OBJ_NAME}" != "${SECRET_NAME}" ]; then
            echo "[FAIL]: SecretProviderClass secretObjects name is '${SECRET_OBJ_NAME}', expected '${SECRET_NAME}'"
            FAILED=1
        else
            echo "[OK]: SecretProviderClass secretObjects references correct secret name"
        fi
        echo ""

        # Test 9: Check for CSI-related errors in pod events
        echo "--- Test 9: Checking for CSI mount errors in pod events ---"
        for POD in ${PODS}; do
            CSI_ERRORS=$(kubectl get events -n "{{ include "falcon-image-analyzer.namespace" . }}" \
              --field-selector involvedObject.name="${POD}" \
              --field-selector type=Warning 2>&1 | grep -i "mount\|csi\|secret" || true)

            if [ -n "${CSI_ERRORS}" ]; then
                echo "[WARN]: Pod '${POD}' has CSI-related warning events:"
                echo "${CSI_ERRORS}"
                # Don't fail on warnings, just report them
            else
                echo "[OK]: Pod '${POD}' has no CSI mount errors"
            fi
        done
        echo ""

        # Summary
        echo "=== Test Summary ==="
        if [ "${FAILED}" -eq 1 ]; then
            echo "[FAIL]: Some CSI integration tests failed"
            exit 1
        else
            echo "[PASS]: All CSI integration tests passed"
            exit 0
        fi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
  serviceAccountName: {{ include "falcon-image-analyzer.fullname" . }}-test-sa
  restartPolicy: Never
{{- end -}}
